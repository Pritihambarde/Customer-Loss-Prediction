<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Prediction</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url('static/background.jpg.jpg'); /* Make sure this file exists */
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            background-color: #4CAF50;
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
            margin-top: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .churn-no {
            color: #2ecc71;
        }

        .churn-yes {
            color: #e74c3c;
        }

        .icon {
            font-size: 26px;
            margin-right: 12px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Customer Churn Prediction</h2>
        <form method="post" action="/predict">
            <label>Age:</label>
            <input type="number" name="age" required>

            <label>Gender:</label>
            <select name="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <label>Tenure:</label>
            <input type="number" name="tenure" required>

            <label>Monthly Charges:</label>
            <input type="text" name="monthly" required>

            <label>Contract Type:</label>
            <select name="contract">
                <option value="month-to-month">Month-to-Month</option>
                <option value="one-year">One-Year</option>
                <option value="two-year">Two-Year</option>
            </select>

            <label>Internet Service:</label>
            <select name="internet">
                <option value="dsl">DSL</option>
                <option value="fiber optic">Fiber Optic</option>
                <option value="none">None</option>
            </select>

            <label>Total Charges:</label>
            <input type="text" name="total" required>

            <label>Tech Support:</label>
            <select name="support">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>

            <input class="btn" type="submit" value="Predict">
        </form>

        {% if prediction_text %}
        <div class="result {% if 'No' in prediction_text %}churn-no{% else %}churn-yes{% endif %}">
            <span class="icon">{% if 'No' in prediction_text %}✅{% else %}⚠️{% endif %}</span>
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>
</body>
</html>
